<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>categoryinfo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin-right: 120px;
        margin-left: 120px;
        padding: 0;
        background-color: #f8f8f8;
      }

      #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background-color: #2c3e50;
        color: white;
      }

      #header h1 {
        margin: 0;
        font-family: "Courier New", Courier, monospace;
        font-size: 28px;
      }

      #nav-links {
        display: flex;
        gap: 15px;
      }

      #main-container {
        background-color: #2c3e50;
        padding: 20px;
        margin: 0 auto;
        max-width: 100%;
      }

      #search-container {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #search-bar {
        padding: 10px;
        width: 95%;
        border: 1px solid #bdc3c7;
        border-radius: 25px 0 0 25px;
        outline: none;
      }

      #search-icon {
        padding: 10px;
        background-color: #2c3e50;
        color: white;
        border: 1px solid #bdc3c7;
        border-left: none;
        border-radius: 0 25px 25px 0;
        cursor: pointer;
      }

      #category-container {
        display: flex;
        justify-content: center;
        margin-top: 35px;
        margin-bottom: 25px;
      }

      .category {
        margin: 0 15px;
        padding: 10px 30px;
        background-color: #eaeaea;
        border-radius: 5px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        color: inherit;
      }

      .category:hover {
        background-color: #dcdcdc;
      }

      #product-list {
        margin: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }

      .product {
        background-color: white;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        padding: 15px;
        text-align: center;
        transition: box-shadow 0.3s;
      }

      .product:hover {
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .product img {
        width: 100%;
        height: 200px;
        margin-bottom: 5px;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
        color: black;
      }

      #websitename {
        color: white;
      }

      #welcome-message {
        position: relative;
        text-align: center;
      }

      #logout-button {
        width: 100%;
        display: none;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        background-color: #e74c3c;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <h1 id="websitename">Negozio</h1>
      <div id="nav-links">
        <a
          href="homepage.html"
          id="homepage-link"
          style="margin-right: 20px; color: white; text-decoration: none"
          >Home</a
        >
        <a
          href="orders.html"
          id="order-link"
          style="margin-right: 20px; color: white; text-decoration: none"
          >Orders</a
        >
        <a
          href="cart.html"
          id="cart-link"
          style="margin-right: 20px; color: white; text-decoration: none"
          >Cart</a
        >
        <div id="welcome-message">
          <span id="welcome-text"></span>
          <button id="logout-button">Logout</button>
        </div>
      </div>
    </div>

    <div id="main-container">
      <div id="search-container">
        <input type="text" id="search-bar" placeholder="Search products..." />
        <div id="search-icon">🔍</div>
      </div>

      <div id="category-container">
        <a href="categoryinfo.html?category=Electronic" class="category"
          >Electronic</a
        >
        <a href="categoryinfo.html?category=Men Section" class="category"
          >Men Section</a
        >
        <a href="categoryinfo.html?category=Women Section" class="category"
          >Women Section</a
        >
        <a href="categoryinfo.html?category=Kids Section" class="category"
          >Kids Section</a
        >
        <a href="categoryinfo.html?category=Watches" class="category"
          >Watches</a
        >
        <a href="categoryinfo.html?category=Footwear" class="category"
          >Footwear</a
        >
        <a href="categoryinfo.html?category=Accessories" class="category"
          >Accessories</a
        >
      </div>
    </div>

    <div id="product-list"></div>
    <script>
      async function checkLogin() {
        try {
          const res = await fetch("http://localhost:4500/user/verify", {
            method: "GET",
            credentials: "include",
          });

          const data = await res.json();
          const welcomeText = document.getElementById("welcome-text");
          const logoutButton = document.getElementById("logout-button");
          const welcomeMessageDiv = document.getElementById("welcome-message");

          if (!data.success) {
            window.location.href = "homepage.html?login";
          } else {
            welcomeText.textContent = `Welcome, ${data.user.name}`;
            welcomeMessageDiv.style.display = "block";
            logoutButton.style.display = "none";

            // Setup hover show/hide for logout
            setupHoverToggle(welcomeMessageDiv, logoutButton);
            setupHoverToggle(logoutButton, logoutButton);

            // Logout functionality
            logoutButton.addEventListener("click", async () => {
              const logoutRes = await fetch(
                "http://localhost:4500/user/logout",
                {
                  method: "GET",
                  credentials: "include",
                }
              );
              const logoutData = await logoutRes.json();
              if (logoutData.success) {
                window.location.href = "homepage.html";
              }
            });

            fetchProducts();
          }
        } catch (error) {
          console.error("Error verifying login:", error);
          window.location.href = "homepage.html?login";
        }
      }

      function setupHoverToggle(element, target, delay = 2000) {
        let timeout;
        element.addEventListener("mouseenter", () => {
          target.style.display = "block";
          clearTimeout(timeout);
        });
        element.addEventListener("mouseleave", () => {
          timeout = setTimeout(() => (target.style.display = "none"), delay);
        });
      }

      checkLogin();
      const searchBar = document.getElementById("search-bar");
      const searchIcon = document.getElementById("search-icon");

      function redirectToSearch() {
        const query = searchBar.value.trim();
        if (query !== "") {
          // Use `q` as the query parameter
          window.location.href = `search.html?q=${encodeURIComponent(query)}`;
        }
      }

      searchIcon.addEventListener("click", redirectToSearch);

      searchBar.addEventListener("keypress", (event) => {
        if (event.key === "Enter") {
          redirectToSearch();
        }
      });

      async function fetchProducts() {
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get("category");

        if (!category) {
          document.getElementById("product-list").innerHTML =
            "<p>Category not found.</p>";
          return;
        }

        try {
          const response = await fetch(
            `http://localhost:4500/product/getproductbycategory/${category}`
          );
          const products = await response.json();
          const productList = document.getElementById("product-list");
          productList.innerHTML = "";

          if (products && products.length > 0) {
            products.forEach((product) => {
              const productDiv = document.createElement("div");
              const firstImage = product.images ? product.images[0] : "";
              productDiv.className = "product";
              productDiv.innerHTML = `
                <a href="productinfo.html?id=${product._id}" style="text-decoration: none; color: inherit;">
                  <img src="${firstImage}" alt="${product.name}">
                  <h2>${product.name}</h2>
                  <p>Price: ₹${product.sellingprice}</p>
                  <p>Description: ${product.shortdescription}</p>
                </a>
              `;
              productList.appendChild(productDiv);
            });
          } else {
            productList.innerHTML = "<p>No products found</p>";
          }
        } catch (error) {
          console.error("Error fetching products:", error);
        }
      }
    </script>
  </body>
</html>
