<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage with Website Name</title>
    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        margin: 0 120px;
        padding-top: 8px;
        background-color: #f8f8f8;
      }
      #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background-color: #2c3e50;
        color: white;
      }
      #websitename {
        margin: 0;
        font-family: "Courier New", Courier, monospace;
        font-size: 28px;
      }
      .container {
        display: flex;
        min-height: calc(100vh - 68px);
      }
      .sidebar {
        width: 250px;
        background-color: white;
        padding: 20px;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
      }
      .sidebar-menu {
        list-style: none;
        padding: 0;
      }
      .sidebar-menu li {
        margin-bottom: 15px;
      }
      .sidebar-menu a {
        display: flex;
        align-items: center;
        color: #333;
        text-decoration: none;
        padding: 10px;
        border-radius: 5px;
        transition: all 0.3s ease;
      }
      .sidebar-menu a:hover,
      .sidebar-menu a.active {
        background-color: #3498db;
        color: white;
      }
      .sidebar-menu i {
        margin-right: 10px;
        width: 20px;
        text-align: center;
      }
      .form-container {
        flex: 1;
        max-width: 800px;
        margin-top: 30px;
        margin-left: 265px;
        padding: 20px;
        background-color: white;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 95%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .form-group input[type="file"] {
        border: none;
      }
      .submit-button {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
      }
      .submit-button:hover {
        background-color: #2980b9;
      }
      .form-text {
        color: #6c757d;
        font-size: 0.875em;
        display: block;
        margin-top: 5px;
      }
      /* New CSS for centering the button */
      .button-container {
        display: flex;
        justify-content: center; /* Center the button horizontally */
        margin-top: 20px; /* Optional: Add some space above the button */
      }
      /* CSS for the message box */
      .message-box {
        background-color: #e7f3fe;
        color: #31708f;
        border: 1px solid #bce8f1;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: none; /* Hidden by default */
      }
    </style>
  </head>
  <body>
    <div id="header">
      <h1 id="websitename">Negozio Vendor</h1>
    </div>

    <div class="container">
      <div class="sidebar">
        <ul class="sidebar-menu">
          <li>
            <a href="vendorallproduct.html">
              <i class="fas fa-box-open"></i>
              Products
            </a>
          </li>
          <li>
            <a href="addproduct.html" class="active">
              <i class="fas fa-plus-circle"></i>
              Add Product
            </a>
          </li>
          <li>
            <a href="activeorders.html">
              <i class="fas fa-shopping-bag"></i>
              Active Orders
            </a>
          </li>
          <li>
            <a href="#" id="logoutButton" style="color: #e74c3c">
              <i class="fas fa-sign-out-alt"></i>
              Logout
            </a>
          </li>
        </ul>
      </div>

      <div class="form-container">
        <h2>Add New Product</h2>
        <div id="messageBox" class="message-box"></div>
        <!-- Message box added here -->
        <form
          action="http://localhost:4500/product/addproduct"
          method="POST"
          enctype="multipart/form-data"
          credentials="require"
        >
          <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="producttype">Product Type</label>
            <input type="text" id="producttype" name="producttype" required />
          </div>
          <div class="form-group">
            <label for="shortdescription">Short Description</label>
            <input
              type="text"
              id="shortdescription"
              name="shortdescription"
              required
            />
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea
              id="description"
              name="description"
              rows="4"
              required
            ></textarea>
          </div>
          <div class="form-group">
            <label for="sellingprice">Selling Price</label>
            <input
              type="number"
              id="sellingprice"
              name="sellingprice"
              required
            />
          </div>
          <div class="form-group">
            <label for="discount">Discount</label>
            <input type="number" id="discount" name="discount" />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="">Select a category</option>
              <option value="Electronic">Electronic</option>
              <option value="Men Section">Men Section</option>
              <option value="Women Section">Women Section</option>
              <option value="Kids Section">Kids Section</option>
              <option value="Watches">Watches</option>
              <option value="Footwear">Footwear</option>
              <option value="Accessories">Accessories</option>
            </select>
          </div>
          <div class="form-group">
            <label for="promotion">Promotion</label>
            <select id="promotion" name="promotion" required>
              <option value="no" selected>No</option>
              <option value="yes">Yes</option>
            </select>
          </div>
          <div class="form-group">
            <label for="images">Upload Images (max 6)</label>
            <input
              type="file"
              id="images"
              name="images"
              multiple
              accept="image/*"
              data-max-files="6"
              required
            />
            <small class="form-text text-muted"
              >Select multiple images (up to 6)</small
            >
          </div>
          <div
            id="image-preview-container"
            style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px"
          ></div>
          <div class="button-container">
            <button type="submit" class="submit-button">Add Product</button>
          </div>
        </form>
      </div>
    </div>
    <script>
      // Function to display a message in the message box
      function showMessage(message) {
        const messageBox = document.getElementById("messageBox");
        messageBox.textContent = message;
        messageBox.style.display = "block"; // Show the message box
      }

      document
        .getElementById("images")
        .addEventListener("change", function (e) {
          const container = document.getElementById("image-preview-container");
          container.innerHTML = "";

          if (this.files.length > 6) {
            alert("Maximum 6 images allowed");
            this.value = "";
            return;
          }

          Array.from(this.files).forEach((file) => {
            const reader = new FileReader();
            reader.onload = function (e) {
              const div = document.createElement("div");
              div.style.width = "100px";
              div.style.height = "100px";
              div.style.overflow = "hidden";
              div.style.borderRadius = "5px";

              const img = document.createElement("img");
              img.src = e.target.result;
              img.style.width = "100%";
              img.style.height = "100%";
              img.style.objectFit = "cover";

              div.appendChild(img);
              container.appendChild(div);
            };
            reader.readAsDataURL(file);
          });
        });
      document
        .getElementById("logoutButton")
        .addEventListener("click", async (event) => {
          event.preventDefault();
          try {
            const response = await fetch(
              "http://localhost:4500/vendor/logout",
              {
                method: "GET",
                credentials: "include",
              }
            );

            const data = await response.json();
            if (data.success) {
              window.location.href = "homepage.html";
            } else {
              console.error("Logout failed:", data.message);
            }
          } catch (error) {
            console.error("Error logging out:", error);
          }
        });
    </script>
  </body>
</html>
